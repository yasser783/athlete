    let deferredPrompt=null;
    window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById('install-banner');if(!localStorage.getItem('install-dismissed')&&!window.matchMedia('(display-mode: standalone)').matches)setTimeout(()=>b.classList.add('show'),3000);});
    document.getElementById('install-btn').onclick=()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(c=>{if(c.outcome==='accepted')document.getElementById('install-banner').classList.remove('show');deferredPrompt=null;});}};
    document.getElementById('install-close').onclick=()=>{document.getElementById('install-banner').classList.remove('show');localStorage.setItem('install-dismissed','1');};
    window.addEventListener('load',()=>{setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('hide');setTimeout(()=>s.remove(),600);},1200);});
    window.sendAppNotif=(title,body,tag='athlete',important=false)=>{if(window._swReg&&window._swReg.active){window._swReg.active.postMessage({type:'NOTIFY',title,body,tag,important});}else if(typeof Notification!=='undefined'&&Notification.permission==='granted'){try{new Notification(title,{body,icon:'./icon-192.png',tag,renotify:true});}catch(e){}}};
    window.scheduleFtour=()=>{const now=new Date(),ftour=new Date();ftour.setHours(18,45,0,0);const delay=ftour-now;if(delay>0&&delay<86400000&&window._swReg&&window._swReg.active){window._swReg.active.postMessage({type:'SCHEDULE',title:'⚡ FTOUR — 18h45',body:'Romps ton jeûne ! Dattes + Whey.',delay,tag:'ftour'});}};
    window.storage={get:async k=>{try{const v=localStorage.getItem('ath_'+k);return v?{key:k,value:v}:null;}catch{return null;}},set:async(k,v)=>{try{localStorage.setItem('ath_'+k,v);return{key:k,value:v};}catch{return null;}},delete:async k=>{try{localStorage.removeItem('ath_'+k);return{key:k,deleted:true};}catch{return null;}},list:async p=>{try{const keys=Object.keys(localStorage).filter(k=>k.startsWith('ath_'+(p||''))).map(k=>k.replace('ath_',''));return{keys};}catch{return{keys:[]};}}};

// ─── WARMUP CALCULATOR ───────────────────────────────────────────────────────
const calcWarmup=(ww)=>{
  if(!ww||ww<=0)return[];
  const bar=20,sets=[];
  const w40=Math.max(bar,Math.round(ww*0.4/2.5)*2.5);
  const w60=Math.max(bar,Math.round(ww*0.6/2.5)*2.5);
  const w80=Math.max(bar,Math.round(ww*0.8/2.5)*2.5);
  if(w40<ww)sets.push({pct:40,weight:w40,reps:10});
  if(w60<ww&&w60>w40)sets.push({pct:60,weight:w60,reps:5});
  if(w80<ww&&w80>w60)sets.push({pct:80,weight:w80,reps:3});
  return sets;
};

const getWeekStartDate=(wkStr)=>{const[y,w]=wkStr.split('-W');const jan1=new Date(parseInt(y),0,1);const dow=jan1.getDay()||7;const monday=new Date(jan1);monday.setDate(jan1.getDate()+(1-dow)+7*(parseInt(w)-1));return monday.toISOString().split('T')[0];};

const playBeep=()=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[[880,0],[1100,.25],[1320,.5]].forEach(([f,d])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(.4,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.2);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.22);});}catch(e){}};

// ─── COMPONENTS ───────────────────────────────────────────────────────────────
function CalRing({consumed,target}){
  const pct=Math.min(1,consumed/target),r=62,cx=72,cy=72,sw=6,circ=2*Math.PI*r;
  const color=pct>=1?"#E74C3C":pct>=.85?"#E8C97A":"#C9A84C";
  return(<div className="ring-wrap"><svg width="144" height="144" viewBox="0 0 144 144">
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1A1A1A" strokeWidth={sw}/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
      strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round"
      transform={`rotate(-90 ${cx} ${cy})`}
      style={{transition:"stroke-dasharray .7s cubic-bezier(.22,1,.36,1)"}}/>
  </svg>
  <div className="ring-center"><div className="ring-val">{consumed}</div><div className="ring-sub">/ {target} kcal</div><div className="ring-pct">{Math.round(pct*100)}%</div></div>
  </div>);
}
function MBar({label,val,max,color}){return(<div className="mbar-box"><div className="mbar-top"><span className="mbar-name">{label}</span><span className="mbar-val">{val}g</span></div><div className="mbar-track"><div className="mbar-fill" style={{width:`${Math.min(100,(val/max)*100)}%`,background:color}}/></div></div>);}
function PBar({label,val,max,unit=""}){return(<div className="pbar"><div className="phead"><span className="plbl">{label}</span><span className="ppct">{val}{unit} / {max}{unit}</span></div><div className="ptrack"><div className="pfill" style={{width:`${Math.min(100,(val/max)*100)}%`}}/></div></div>);}
function LineChart({data,color,label,unit=""}){
  if(!data||data.length<2)return(<div className="chart-wrap"><div className="chart-title">{label}</div><p style={{fontSize:7,color:"var(--dim)",padding:"9px 0",textAlign:"center"}}>Pas assez de données</p></div>);
  const vals=data.map(d=>d.val),W=290,H=55;
  const mn=Math.min(...vals)*0.95,mx=Math.max(...vals)*1.05||mn+1;
  const px=i=>(i/(vals.length-1))*W,py=v=>H-((v-mn)/((mx-mn)||1))*H;
  const pts=vals.map((v,i)=>`${px(i)},${py(v)}`).join(" ");
  const area=`M${px(0)},${H} `+vals.map((v,i)=>`L${px(i)},${py(v)}`).join(" ")+` L${px(vals.length-1)},${H} Z`;
  const gid=`g${(label||"").replace(/\W/g,"")}`;
  return(<div className="chart-wrap"><div className="chart-title">{label}</div>
    <svg width="100%" viewBox={`0 0 ${W} ${H+13}`} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity=".18"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill={`url(#${gid})`}/><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
      {vals.map((v,i)=><circle key={i} cx={px(i)} cy={py(v)} r="2.5" fill={color}/>)}
      {[0,Math.floor(data.length/2),data.length-1].filter((v,i,a)=>a.indexOf(v)===i).map(i=><text key={i} x={px(i)} y={H+12} textAnchor="middle" fill="#68605A" fontSize="7" fontFamily="JetBrains Mono">{data[i].label}</text>)}
    </svg>
    <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:6,color:"var(--dim)"}}>
      <span>Min:<span style={{color}}>{Math.min(...vals)}{unit}</span></span>
      <span>Moy:<span style={{color}}>{Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}{unit}</span></span>
      <span>Max:<span style={{color}}>{Math.max(...vals)}{unit}</span></span>
    </div>
  </div>);
}

function Toggle({on,onToggle}){return(<div className={`toggle-sw${on?" on":""}`} onClick={onToggle}><div className="toggle-knob"/></div>);}


// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dashboard");
  const [selDay,setSelDay]=useState(getTodayKey());
  const [statsTab,setStatsTab]=useState("bilan");
  const [toast,setToast]=useState({show:false,msg:""});
  const [notifOk,setNotifOk]=useState(false);
  const [now,setNow]=useState(new Date());
  const [timer,setTimer]=useState(null);
  const timerRef=useRef(null);

  // Cal
  const [checked,setChecked]=useState({});
  const [custom,setCustom]=useState([]);
  const [targets,setTargets]=useState({train:1920,rest:1520,p:135,c:170,f:42});
  const [dynMacros,setDynMacros]=useState(false); // dynamic macros toggle

  // Search
  const [query,setQuery]=useState("");
  const [suggs,setSuggs]=useState([]);
  const [focusIdx,setFocusIdx]=useState(-1);
  const [aiLoad,setAiLoad]=useState(false);
  const [sel,setSel]=useState(null);
  const [qty,setQty]=useState(100);
  const [showSugg,setShowSugg]=useState(false);

  // Training
  const [sessions,setSessions]=useState({});
  const [exercises,setExercises]=useState({});
  const [prData,setPrData]=useState({});
  const [sessW,setSessW]=useState({});
  const [notes,setNotes]=useState({});
  const [selPrEx,setSelPrEx]=useState(null);

  // Goals
  const [goals,setGoals]=useState({});
  const [goalForm,setGoalForm]=useState({ex:"",target:"",deadline:""});

  // Period & Phase
  const [periodSettings,setPeriodSettings]=useState({startDate:getDateId(),phase:"bulk",trainTime:"19:00"});

  // Supps & Hydro
  const [supps,setSupps]=useState({});
  const [hydro,setHydro]=useState({});

  // Weight
  const [wlog,setWlog]=useState([]);
  const [wInput,setWInput]=useState("");

  // Bilan
  const [bilanData,setBilanData]=useState([]);

  // Calculators
  const [tdeeForm,setTdeeForm]=useState({w:"",h:"",a:"",sex:"H",act:"active"});
  const [tdeeResult,setTdeeResult]=useState(null);
  const [ormForm,setOrmForm]=useState({w:"",r:""});
  const [ormResult,setOrmResult]=useState(null);
  const [timingForm,setTimingForm]=useState({trainTime:""});
  const [timingResult,setTimingResult]=useState(null);

  // ── NEW STATES ────────────────────────────────────────────
  const [recoveryLog,setRecoveryLog]=useState({});
  const [sleepLog,setSleepLog]=useState({});
  const [aiAnalysis,setAiAnalysis]=useState("");
  const [aiAnalysisLoading,setAiAnalysisLoading]=useState(false);
  const [dismissedAlerts,setDismissedAlerts]=useState([]);
  const [supaConfig,setSupaConfig]=useState({url:"",key:"",connected:false,syncing:false,lastSync:null,error:""});
  const [measLog,setMeasLog]=useState([]);
  const [measInput,setMeasInput]=useState({bras:"",taille:"",cuisse:"",poitrine:"",hanches:""});
  const [showAlts,setShowAlts]=useState({});


  const today=getTodayKey(),wkId=getWeekId(),dtId=getDateId();
  const prevWkId=getPrevWeekId();
  const isTrain=TRAIN_DAYS.has(today);
  const allExNames=[...new Set(Object.values(TP).flatMap(d=>d.exercises.map(e=>e.name)))];
  const lastW=wlog.length>0?wlog[wlog.length-1].weight:null;

  // ── Periodization ──────────────────────────────────────────────────────────
  const currentPeriod=useMemo(()=>{
    const start=new Date(periodSettings.startDate);
    const todayD=new Date();
    const weekNum=Math.max(0,Math.floor((todayD-start)/(7*24*3600*1000)));
    const wInCycle=weekNum%4;
    return{weekNum:weekNum+1,weekInCycle:wInCycle+1,block:PERIOD_BLOCKS[wInCycle],isDeload:wInCycle===3,color:PERIOD_COLORS[PERIOD_BLOCKS[wInCycle]]};
  },[periodSettings.startDate]);

  // ── Dynamic targets ────────────────────────────────────────────────────────
  const effTargets=useMemo(()=>{
    if(!dynMacros||!lastW)return targets;
    const m=PHASE_MACROS[periodSettings.phase]||PHASE_MACROS.bulk;
    const w=lastW;
    return{
      train:Math.round(w*m.calMult*(isTrain?1.1:1)),
      rest:Math.round(w*m.calMult),
      p:Math.round(w*m.p),
      c:Math.round(w*m.c),
      f:Math.round(w*m.f),
    };
  },[dynMacros,lastW,targets,periodSettings.phase,isTrain]);

  const effCal=isTrain?effTargets.train:effTargets.rest;

  // ── Totals ──────────────────────────────────────────────────────────────────
  const presetTot=(()=>{let cal=0,p=0,c=0,f=0;Object.entries(PRESET_MEALS).forEach(([mk,m])=>m.items.forEach((it,i)=>{if(checked[`${mk}-${i}`]){cal+=it.cal;p+=it.p;c+=it.c;f+=it.f;}}));return{cal,p,c,f};})();
  const custTot=custom.reduce((a,x)=>({cal:a.cal+x.cal,p:a.p+x.p,c:a.c+x.c,f:a.f+x.f}),{cal:0,p:0,c:0,f:0});
  const tot={cal:presetTot.cal+custTot.cal,p:presetTot.p+custTot.p,c:presetTot.c+custTot.c,f:presetTot.f+custTot.f};

  // ── Ftour countdown ────────────────────────────────────────────────────────
  const ftour=useMemo(()=>{
    const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
    const nowS=h*3600+m*60+s,ftS=18*3600+45*60,diff=ftS-nowS;
    if(diff<0&&diff>-7200)return{passed:true,display:"FTOUR ✓",soon:false};
    if(diff<0)return null;
    const hh=Math.floor(diff/3600),mm=Math.floor((diff%3600)/60),ss=diff%60;
    return{passed:false,soon:diff<600,display:`${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`};
  },[now]);

  // ── Water pace ─────────────────────────────────────────────────────────────
  const waterPace=useMemo(()=>{
    const h=now.getHours(),m=now.getMinutes();
    const nowMin=h*60+m,ftMin=18*60+45,suMin=5*60;
    let elapsed,total;
    if(nowMin>=ftMin){elapsed=nowMin-ftMin;total=(24*60-ftMin)+suMin;}
    else if(nowMin<suMin){elapsed=(24*60-ftMin)+nowMin;total=(24*60-ftMin)+suMin;}
    else return null;
    const target=8,glassML=250,targetML=target*glassML;
    const expected=Math.floor((elapsed/total)*target);
    const actual=hydro[dtId]||0;
    const remaining=target-actual;
    const minLeft=total-elapsed;
    const hoursLeft=Math.max(0.1,minLeft/60);
    const mlDrunk=actual*glassML;
    const mlRemaining=Math.max(0,targetML-mlDrunk);
    const mlPerHour=Math.round(mlRemaining/hoursLeft);
    const glassesPerHour=remaining>0?Math.round((remaining/hoursLeft)*10)/10:0;
    const minPerGlass=remaining>0?Math.round(minLeft/remaining):0;
    const nextGlassMin=remaining>0?Math.round(minLeft/remaining):0;
    const nextGlassTime=(()=>{if(remaining<=0)return null;const ng=nowMin+nextGlassMin;const nH=Math.floor((ng%1440)/60),nM=(ng%1440)%60;return`${String(nH).padStart(2,"0")}:${String(nM).padStart(2,"0")}`;})();
    return{expected,actual,remaining,minLeft,onPace:actual>=expected,
      mlDrunk,mlRemaining,mlPerHour,glassesPerHour,minPerGlass,nextGlassTime,hoursLeft};
  },[now,hydro,dtId]);

  // ── Weekly caloric balance ──────────────────────────────────────────────────
  const weeklyBalance=useMemo(()=>{
    if(bilanData.length===0)return null;
    const totalTarget=bilanData.length*effCal;
    const totalActual=bilanData.reduce((s,d)=>s+d.cal,0);
    const balance=totalActual-totalTarget;
    const daysLeft=Math.max(1,7-bilanData.length);
    const perDayAdjust=Math.round(-balance/daysLeft);
    return{balance,daysLeft,adjustedTarget:effCal+perDayAdjust,isDeficit:balance<0};
  },[bilanData,effCal]);

  // ── Progressive overload ───────────────────────────────────────────────────
  const getProgression=(dk,idx)=>{
    const ex=TP[dk]?.exercises[idx];
    if(!ex)return null;
    const prevWeight=sessW[`${prevWkId}-${dk}-${idx}`];
    if(!prevWeight)return null;
    const w=parseFloat(prevWeight);
    if(isNaN(w)||w<=0)return null;
    if(currentPeriod.isDeload)return{kg:Math.round(w*0.7*2)/2,reason:"DELOAD 70%"};
    const inc=ex.heavy?2.5:1.25;
    return{kg:w+inc,reason:`SURCHARGE +${inc}kg`};
  };

  // ── Smart rest time ────────────────────────────────────────────────────────
  const getSmartRest=(dk,idx)=>{
    const ex=TP[dk]?.exercises[idx];
    if(!ex)return 120;
    const base=parseRest(ex.rest);
    const doneCount=(exercises[`${wkId}-${dk}`]||[]).length;
    if(currentPeriod.isDeload)return Math.round(base*0.7);
    const fatiguBonus=doneCount>=5?60:doneCount>=3?30:0;
    return base+fatiguBonus;
  };

  // ── Streak ────────────────────────────────────────────────────────────────
  const streak=useMemo(()=>{
    let s=0;
    for(let i=0;i<30;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const dk=["DIMANCHE","LUNDI","MARDI","MERCREDI","JEUDI","VENDREDI","SAMEDI"][d.getDay()];
      const wId=()=>{const s2=new Date(d.getFullYear(),0,1),w=Math.ceil(((d-s2)/86400000+s2.getDay()+1)/7);return`${d.getFullYear()}-W${w}`;};
      if(TRAIN_DAYS.has(dk)){if(sessions[`${wId()}-${dk}`])s++;else if(i>0)break;}
    }
    return s;
  },[sessions]);

  // ── Competition data ───────────────────────────────────────────────────────
  const competitionData=useMemo(()=>{
    const thisStart=getWeekStartDate(wkId);
    const prevStart=getWeekStartDate(prevWkId);
    const results=[];
    allExNames.forEach(name=>{
      const hist=prData[name]||[];
      const thisB=hist.filter(e=>e.date>=thisStart&&e.date<=dtId).reduce((mx,e)=>Math.max(mx,e.weight),0)||null;
      const prevB=hist.filter(e=>e.date>=prevStart&&e.date<thisStart).reduce((mx,e)=>Math.max(mx,e.weight),0)||null;
      if(thisB||prevB)results.push({name,thisWeek:thisB,lastWeek:prevB,delta:thisB&&prevB?thisB-prevB:null});
    });
    return results;
  },[prData,wkId,prevWkId,dtId]);

  // ── Goal progress ──────────────────────────────────────────────────────────
  const getGoalProgress=name=>{
    const goal=goals[name];
    if(!goal)return null;
    const hist=prData[name]||[];
    const best=hist.length>0?Math.max(...hist.map(h=>h.weight)):goal.startKg;
    const progress=(best-goal.startKg)/Math.max(1,goal.targetKg-goal.startKg);
    const today2=new Date(),deadline=new Date(goal.deadline),start=new Date(goal.startDate);
    const totalDays=Math.max(1,(deadline-start)/86400000);
    const daysLeft=Math.max(0,(deadline-today2)/86400000);
    const timeProgress=1-daysLeft/totalDays;
    const weeklyNeeded=(goal.targetKg-best)/Math.max(.1,daysLeft/7);
    return{best,progress:Math.min(1,Math.max(0,progress)),timeProgress,daysLeft:Math.round(daysLeft),weeklyNeeded:Math.round(weeklyNeeded*10)/10,onTrack:progress>=timeProgress*0.85};
  };

  // ── Effects ────────────────────────────────────────────────────────────────
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);

  useEffect(()=>{
    (async()=>{
      const ld=async(k,set)=>{try{const r=await window.storage.get(k);if(r)set(JSON.parse(r.value));}catch{}};
      ld("v7_sess",setSessions);ld("v7_exer",setExercises);ld("v7_wlog",setWlog);
      ld("v7_pr",setPrData);ld("v7_notes",setNotes);ld("v7_targets",setTargets);
      ld("v7_hydro",setHydro);ld("v7_supps",setSupps);ld("v7_goals",setGoals);
      ld("v7_period",setPeriodSettings);ld("v7_dynmac",setDynMacros);
      ld(`v7_chk-${dtId}`,setChecked);ld(`v7_cust-${dtId}`,setCustom);
      ld(`v7_sw-${wkId}`,setSessW);
      ld("v7_recovery",setRecoveryLog);ld("v7_sleep",setSleepLog);
      ld("v7_supa",setSupaConfig);ld("v7_meas",setMeasLog);
      if(typeof Notification!=="undefined"&&Notification.permission==="granted")setNotifOk(true);
      if(typeof window.scheduleFtour==="function")window.scheduleFtour();
    })();
    return()=>{if(timerRef.current)clearInterval(timerRef.current);};
  },[]);

  useEffect(()=>{
    const h=now.getHours(),m=now.getMinutes(),s=now.getSeconds();
    if(h===18&&m===45&&s===0){playBeep();notify("⚡ FTOUR","Il est 18h45 — Romps ton jeûne !","ftour");}
    if(h===4&&m===45&&s===0){notify("🌙 S'HOUR","Il est 4h45 — Prépare ton repas !","suhoor");}
  },[now]);

  useEffect(()=>{
    if(tab==="stats"&&(statsTab==="bilan"||statsTab==="graphes"||statsTab==="competition"||statsTab==="objectifs"||statsTab==="insights"))loadBilan();
  },[tab,statsTab]);

  const sv=async(k,v)=>{try{await window.storage.set(k,JSON.stringify(v));}catch{}};
  const showToast=msg=>{setToast({show:true,msg});setTimeout(()=>setToast({show:false,msg:""}),2500);};

  const loadBilan=async()=>{
    const data=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=d.toISOString().split("T")[0];
      try{const r=await window.storage.get(`v7_daily-${ds}`);if(r)data.push({...JSON.parse(r.value),date:ds});}catch{}
    }
    setBilanData(data);
  };

  useEffect(()=>{if(tot.cal>0)sv(`v7_daily-${dtId}`,{cal:tot.cal,p:tot.p,c:tot.c,f:tot.f});},[tot.cal]);

  // ── Timer ──────────────────────────────────────────────────────────────────
  const startTimer=(seconds,exName)=>{
    if(timerRef.current)clearInterval(timerRef.current);
    setTimer({seconds,total:seconds,exName});
    timerRef.current=setInterval(()=>{
      setTimer(t=>{
        if(!t)return null;
        if(t.seconds<=1){clearInterval(timerRef.current);playBeep();notify("💪 Repos terminé",`${t.exName} — C'est reparti !`,"timer");return null;}
        return{...t,seconds:t.seconds-1};
      });
    },1000);
  };
  const stopTimer=()=>{if(timerRef.current)clearInterval(timerRef.current);setTimer(null);};

  // ── Food handlers ──────────────────────────────────────────────────────────
  const toggleFood=async k=>{const n={...checked,[k]:!checked[k]};setChecked(n);sv(`v7_chk-${dtId}`,n);};
  const removeCustom=async i=>{const n=custom.filter((_,j)=>j!==i);setCustom(n);sv(`v7_cust-${dtId}`,n);};
  const resetDay=async()=>{setChecked({});setCustom([]);sv(`v7_chk-${dtId}`,{});sv(`v7_cust-${dtId}`,[]);showToast("JOURNÉE RÉINITIALISÉE");};

  const handleQ=val=>{setQuery(val);setSel(null);if(val.length>=2){const r=searchDB(val);setSuggs(r);setShowSugg(true);setFocusIdx(-1);}else{setSuggs([]);setShowSugg(false);}};
  const selectSugg=f=>{setSel({nom:f.nom,cal100:f.cal,p100:f.p,c100:f.c,f100:f.f,source:"ciqual",unit:"g"});setQty(100);setQuery(f.nom);setShowSugg(false);setSuggs([]);};
  const callAI=async q=>{
    setAiLoad(true);setShowSugg(false);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:`Base CIQUAL/USDA. JSON strict sans markdown: {"nom":"","qty":100,"unit":"g","cal":0,"p":0,"c":0,"f":0,"cal100":0,"p100":0,"c100":0,"f100":0}`,messages:[{role:"user",content:q}]})});
      const d=await r.json(),txt=d.content?.[0]?.text||"";
      const p=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setSel({nom:p.nom,cal100:p.cal100,p100:p.p100,c100:p.c100,f100:p.f100,source:"ai",unit:p.unit||"g"});
      setQty(p.qty||100);setQuery(p.nom);
    }catch{showToast("ERREUR IA");}
    setAiLoad(false);
  };
  const handleKeyDown=e=>{
    if(e.key==="ArrowDown"){e.preventDefault();setFocusIdx(i=>Math.min(i+1,suggs.length-1));}
    if(e.key==="ArrowUp"){e.preventDefault();setFocusIdx(i=>Math.max(i-1,-1));}
    if(e.key==="Enter"){e.preventDefault();if(focusIdx>=0&&suggs[focusIdx])selectSugg(suggs[focusIdx]);else if(suggs.length===0&&query.length>=2)callAI(query);else if(suggs.length>0)selectSugg(suggs[0]);}
    if(e.key==="Escape")setShowSugg(false);
  };
  const cm=sel?{cal:Math.round(sel.cal100*qty/100),p:Math.round(sel.p100*qty/100),c:Math.round(sel.c100*qty/100),f:Math.round(sel.f100*qty/100)}:null;
  const addFood=async()=>{if(!sel||!cm)return;const e={name:sel.nom,qty,unit:sel.unit,source:sel.source,...cm};const n=[...custom,e];setCustom(n);sv(`v7_cust-${dtId}`,n);setSel(null);setQuery("");setSuggs([]);showToast(`+${e.cal} KCAL ✓`);};

  // ── Training handlers ──────────────────────────────────────────────────────
  const toggleEx=async(dk,idx)=>{
    const k=`${wkId}-${dk}`,cur=exercises[k]||[],wasDone=cur.includes(idx);
    const upd=wasDone?cur.filter(i=>i!==idx):[...cur,idx];
    const n={...exercises,[k]:upd};setExercises(n);sv("v7_exer",n);

                {waterPace.onPace
                  ?<span className="wp-badge" style={{color:"#27AE60",borderColor:"#27AE60"}}>✓ ON PACE</span>
                  :<span className="wp-badge" style={{color:"#E74C3C",borderColor:"#E74C3C"}}>RETARD</span>
                }
              </div>
            </div>
            {waterPace.remaining>0&&<div style={{background:"var(--dark)",border:"1px solid var(--b)",padding:"7px 9px",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,textAlign:"center"}}>
              <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:waterPace.mlPerHour>350?"#E74C3C":"var(--t)"}}>{waterPace.mlPerHour}</div><div style={{fontSize:5,color:"var(--dim)",letterSpacing:1,textTransform:"uppercase"}}>ml/heure</div></div>
              <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"var(--t)"}}>{waterPace.remaining}</div><div style={{fontSize:5,color:"var(--dim)",letterSpacing:1,textTransform:"uppercase"}}>verres restants</div></div>
              <div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,color:"var(--g)"}}>{waterPace.minPerGlass>0?"~"+waterPace.minPerGlass+"min":"—"}</div><div style={{fontSize:5,color:"var(--dim)",letterSpacing:1,textTransform:"uppercase"}}>entre chaque</div></div>
            </div>}
            {waterPace.remaining>0&&waterPace.nextGlassTime&&<div style={{fontSize:7,color:"var(--g)",letterSpacing:1,textAlign:"center",paddingTop:2}}>
              Prochain verre au plus tard à <strong>{waterPace.nextGlassTime}</strong> · 1 verre = 250ml
            </div>}
          </div>}

          {/* Weekly cal balance */}
          {weeklyBalance&&Math.abs(weeklyBalance.balance)>100&&<div className={`cal-balance${weeklyBalance.isDeficit?" deficit":" surplus"}`}>
            <div className="cb-row">
              <div className="cb-lbl">⚖ BALANCE HEBDO</div>
              <div className="cb-val" style={{color:weeklyBalance.isDeficit?"#27AE60":"#E74C3C"}}>{weeklyBalance.isDeficit?"-":"+"}{ Math.abs(weeklyBalance.balance)} kcal</div>
            </div>
            <div className="cb-hint">Objectif ajusté: {weeklyBalance.adjustedTarget} kcal/jour ({weeklyBalance.daysLeft}j restants)</div>
          </div>}

          <div className="streak-row">
            <div className="streak-box"><div className="streak-val">{sessDone}/4</div><div className="streak-lbl">Séances</div></div>
            <div className="streak-box"><div className="streak-val">{streak}🔥</div><div className="streak-lbl">Streak</div></div>
            <div className="streak-box"><div className="streak-val">{hydroCount}/8</div><div className="streak-lbl">Eau</div></div>
            <div className="streak-box"><div className="streak-val">{suppsDoneCount}/4</div><div className="streak-lbl">Suppl.</div></div>
          </div>

          <div className="kgrid">
            <div className="kpi"><div className="klbl">Calories</div><div className="kval">{tot.cal}</div><div className="kunit">/ {effCal} kcal</div></div>
            <div className="kpi"><div className="klbl">Protéines</div><div className="kval">{tot.p}g</div><div className="kunit">/ {effTargets.p}g</div></div>
          </div>
          <PBar label="CALORIES" val={tot.cal} max={effCal} unit=" kcal"/>
          <PBar label="PROTÉINES" val={tot.p} max={effTargets.p} unit="g"/>


          {/* RECOVERY SCORE */}
          <p className="stitle">🧠 Score de récupération</p>
          <div className="recov-card">
            <div className="recov-title">Check-in matinal</div>
            <div className="recov-grid">
              {[{key:"sleep",label:"Sommeil"},{key:"energy",label:"Énergie"},{key:"pain",label:"Douleurs"}].map(({key,label})=>(
                <div key={key} className="recov-item">
                  <div className="recov-lbl">{label}</div>
                  <div className="recov-stars">
                    {[1,2,3,4,5].map(n=><button key={n} className={`recov-star${todayRecovery[key]>=n?" active":""}`} onClick={()=>setRecoveryField(key,n)}>{n}</button>)}
                  </div>
                </div>
              ))}
            </div>
            {recoveryFilled&&<div className="recov-avg">
              <div className="recov-score" style={{color:recoveryAvg>=4?"#27AE60":recoveryAvg>=3?"#C9A84C":"#E74C3C"}}>{recoveryAvg}/5</div>
              <div className="recov-status" style={{color:recoveryAvg>=4?"#27AE60":recoveryAvg>=3?"#C9A84C":"#E74C3C",borderColor:recoveryAvg>=4?"#27AE60":recoveryAvg>=3?"#C9A84C":"#E74C3C"}}>{recoveryAvg>=4?"FRAIS":recoveryAvg>=3?"CORRECT":"FATIGUÉ"}</div>
            </div>}
          </div>

          {/* SLEEP TRACKING */}
          <p className="stitle">😴 Suivi sommeil</p>
          <div className="sleep-card">
            <div className="sleep-title">Log sommeil</div>
            <div className="sleep-grid">
              <div><div className="recov-lbl" style={{marginBottom:4}}>Coucher</div><input type="time" className="sleep-input" value={todaySleep.bedtime} onChange={e=>setSleepField("bedtime",e.target.value)}/></div>
              <div><div className="recov-lbl" style={{marginBottom:4}}>Réveil</div><input type="time" className="sleep-input" value={todaySleep.wake} onChange={e=>setSleepField("wake",e.target.value)}/></div>
              <div><div className="recov-lbl" style={{marginBottom:4}}>Qualité</div><div className="recov-stars" style={{justifyContent:"center"}}>{[1,2,3,4,5].map(n=><button key={n} className={`recov-star${todaySleep.quality>=n?" active":""}`} onClick={()=>setSleepField("quality",n)} style={{width:18,height:18,fontSize:9}}>{n}</button>)}</div></div>
            </div>
            {sleepDuration&&<div className="sleep-duration"><div className="sleep-dur-val">{sleepDuration.hours}h{String(sleepDuration.minutes).padStart(2,"0")}</div><div className="sleep-dur-lbl">{sleepDuration.total>=420?"✓ SUFFISANT":"⚠ INSUFFISANT (< 7h)"}</div></div>}
          </div>

          {/* PLATEAU DETECTION */}
          {plateaus.length>0&&<><p className="stitle">⚠ Plateaux détectés</p>
            {plateaus.map(p=><div key={p.name} className="plateau-card">
              <div className="plateau-title">STAGNATION</div>
              <div className="plateau-ex">{p.name}: bloqué à {p.weight}kg</div>
              <div className="plateau-detail">Pas de progression depuis 3+ semaines. Solutions :</div>
              <div className="plateau-solutions">
                <div className="plateau-sol">→ Changer le schéma: passer en 4×8 au lieu de 3×5</div>
                <div className="plateau-sol">→ Variation: {EXERCISE_ALTS[p.name]?EXERCISE_ALTS[p.name][0].name:"tempo lent / pause rack"}</div>
                <div className="plateau-sol">→ Deload stratégique: -30% pendant 1 semaine</div>
              </div>
            </div>)}
          </>}

          <p className="stitle">Hydratation</p>
          <div className="hydro-wrap">
            <div className="hydro-top"><div><div className="hydro-title">💧 Water Intake</div><div style={{fontSize:6,color:"var(--dim)",marginTop:2}}>Objectif 8 verres · 2L (ftour → s'hour)</div></div><div><div className="hydro-count">{hydroCount}<span style={{fontSize:9,color:"var(--dim)"}}>/8</span></div><div className="hydro-sub">{(hydroCount*.25).toFixed(2)}L</div></div></div>
            <div className="glasses">{Array.from({length:8},(_,i)=><div key={i} className={`glass${i<hydroCount?" filled":""}`} onClick={()=>setHydroCount(i<hydroCount?i:i+1)}><div className="glass-fill"/></div>)}</div>
            <div className="hydro-btns"><button className="hydro-btn" onClick={()=>setHydroCount(hydroCount-1)}>−</button><button className="hydro-btn" onClick={()=>setHydroCount(hydroCount+1)}>+</button></div>
          </div>

          <p className="stitle">Suppléments</p>
          <div className="supps-grid">
            {SUPPLEMENTS.map(s=><div key={s.id} className={`supp-card${isSuppDone(s.id)?" done":""}`} onClick={()=>toggleSupp(s.id)}><div className="supp-check">{isSuppDone(s.id)?"✓":""}</div><div className="supp-icon">{s.icon}</div><div className="supp-name">{s.name}</div><div className="supp-dose">{s.dose}</div><div className="supp-note">{s.note}</div></div>)}
          </div>

          <p className="stitle">Semaine</p>
          <div className="wstrip">{DAYS_ORDER.map(d=><div key={d} className={`wday${d===today?" today":""}${sessions[`${wkId}-${d}`]?" done":""}${TP[d].tag==="REPOS"?" rest":""}`} onClick={()=>{setSelDay(d);setTab("training")}}><div className="wdlbl">{DAYS_FR[d]}</div><div className="wddot"/></div>)}</div>
        </>}

        {/* ══════════════ CALORIES ══════════════ */}
        {tab==="calories"&&<>
          <CalRing consumed={tot.cal} target={effCal}/>
          <div className="mbars"><MBar label="Prot." val={tot.p} max={effTargets.p} color="#E8C97A"/><MBar label="Gluc." val={tot.c} max={effTargets.c} color="#5DADE2"/><MBar label="Lip." val={tot.f} max={effTargets.f} color="#58D68D"/></div>

          <div className="macro-mode-bar">
            <span style={{fontSize:6,letterSpacing:2,textTransform:"uppercase",color:"var(--dim)"}}>Macros {dynMacros?"auto (poids actuel)":"manuelles"} · {isTrain?"Entraînement":"Repos"}</span>
            <Toggle on={dynMacros} onToggle={()=>{const v=!dynMacros;setDynMacros(v);sv("v7_dynmac",v);showToast(v?"MACROS AUTO ✓":"MACROS MANUELLES");}}/>
          </div>

          {weeklyBalance&&Math.abs(weeklyBalance.balance)>100&&<div className={`cal-balance${weeklyBalance.isDeficit?" deficit":" surplus"}`} style={{marginBottom:8}}>
            <div className="cb-row"><div className="cb-lbl">⚖ Balance semaine</div><div className="cb-val" style={{color:weeklyBalance.isDeficit?"#27AE60":"#E74C3C"}}>{weeklyBalance.isDeficit?"-":"+"}{ Math.abs(weeklyBalance.balance)} kcal</div></div>
            <div className="cb-hint">Cible ajustée aujourd'hui: {weeklyBalance.adjustedTarget} kcal</div>
          </div>}

          <div className="search-box">
            <div className="search-title">⊕ AJOUTER UN ALIMENT</div>
            <div className="search-hint"><span style={{color:"#27AE60"}}>● CIQUAL</span> · <span style={{color:"#C9A84C"}}>● IA fallback</span> · Entrée = valider · ↑↓ naviguer</div>
            <div style={{position:"relative"}}>
              <input className="search-input" placeholder="Poulet, msemen, sardine..." value={query} onChange={e=>handleQ(e.target.value)} onKeyDown={handleKeyDown} onFocus={()=>suggs.length>0&&setShowSugg(true)} autoComplete="off"/>
              {showSugg&&suggs.length>0&&<div className="suggestions">{suggs.map((f,i)=><div key={f.id} className={`sug-item${focusIdx===i?" focused":""}`} onMouseDown={()=>selectSugg(f)}><div><div className="sug-name">{f.nom}</div><div className="sug-cat">{f.cat} · CIQUAL</div></div><div><div className="sug-cal">{f.cal}<span style={{fontSize:6,color:"var(--dim)"}}>/100g</span></div><div className="sug-mac">P:{f.p}g G:{f.c}g L:{f.f}g</div></div></div>)}</div>}
              {showSugg&&suggs.length===0&&query.length>=2&&!aiLoad&&!sel&&<div className="no-result"><span>Pas dans CIQUAL</span><button className="no-result-ai" onMouseDown={()=>callAI(query)}>Analyser IA →</button></div>}
            </div>
            {aiLoad&&<div className="ai-thinking"><div className="aidot"/><div className="aidot"/><div className="aidot"/><span>Analyse IA...</span></div>}
            {sel&&cm&&<div className="result-card"><div className="result-name">{sel.nom}</div><div className="result-src">Source: {sel.source==="ciqual"?<span className="src-ciqual">✓ CIQUAL</span>:<span className="src-ai">✦ IA</span>}</div><div className="qty-row"><input type="number" className="qty-input" value={qty} onChange={e=>setQty(parseFloat(e.target.value)||0)} min="1"/><span className="qty-unit">{sel.unit}</span><span className="qty-cal">{cm.cal} kcal</span></div><div className="result-macs"><span className="r-mac">P:<span>{cm.p}g</span></span><span className="r-mac">G:<span>{cm.c}g</span></span><span className="r-mac">L:<span>{cm.f}g</span></span></div><button className="add-btn" onClick={addFood}>+ AJOUTER AU JOURNAL</button></div>}
          </div>

          {custom.length>0&&<><p className="stitle">Ajouts manuels</p><div className="custom-log">{custom.map((f,i)=><div key={i} className="cf-row"><div><div className="cf-name">{f.name}</div><div className="cf-sub">{f.qty}{f.unit} · P:{f.p}g G:{f.c}g L:{f.f}g</div></div><div className="cf-right"><div className="cf-cal">{f.cal}<span style={{fontSize:6,color:"var(--dim)"}}> kcal</span></div><button className="del-btn" onClick={()=>removeCustom(i)}>✕</button></div></div>)}</div></>}

          <p className="stitle">Plan Ramadan</p>
          {Object.entries(PRESET_MEALS).map(([mk,meal])=>{const mCal=meal.items.reduce((s,it,i)=>s+(checked[`${mk}-${i}`]?it.cal:0),0);return(<div key={mk} className="meal-sec"><div className="msec-hdr"><div className="msec-l"><span style={{fontSize:11}}>{meal.emoji}</span><div><div className="msec-name">{meal.label}</div><div className="msec-sub">{meal.items.length} aliments</div></div></div><div><div className="msec-cal">{mCal}</div><div className="msec-unit">kcal cochés</div></div></div><div className="mitems">{meal.items.map((it,i)=>{const k=`${mk}-${i}`,on=!!checked[k];return(<div key={i} className={`frow${on?" on":""}`} onClick={()=>toggleFood(k)}><div className="fchk">{on?"✓":""}</div><div style={{flex:1}}><div className="fname">{it.name}</div><div className="fqty">{it.qty}{it.unit}</div></div><div className="fmacros"><div className="fcal">{it.cal} kcal</div><div>P:{it.p}g G:{it.c}g L:{it.f}g</div></div></div>);})}</div></div>);})}
          <button className="reset-btn" onClick={resetDay}>↺ RÉINITIALISER LA JOURNÉE</button>
        </>}

        {/* ══════════════ TRAINING ══════════════ */}
        {tab==="training"&&<>
          {/* Periodization banner */}
          <div className="period-banner" style={{borderColor:currentPeriod.color+"44",color:currentPeriod.color,background:`rgba(0,0,0,.3)`}}>
            <div>
              <div className="pb-block">{forceDeload?"⚠ DELOAD FORCÉ":currentPeriod.block}</div>
              <div style={{fontSize:6,color:"var(--dim)",marginTop:2,letterSpacing:1}}>{currentPeriod.isDeload?"↓ Volume -40% / Intensité -30%":"Progression surcharge progressive"}</div>
            </div>
            <div className="pb-week">
              <span style={{color:currentPeriod.color}}>SEM. {currentPeriod.weekInCycle}/4</span>
              <span style={{fontSize:6,color:"var(--dim)"}}>Cycle #{Math.ceil(currentPeriod.weekNum/4)}</span>
            </div>
            <div className="pb-bar" style={{width:`${(currentPeriod.weekInCycle/4)*100}%`}}/>
          </div>

          <div className="dtabs">{DAYS_ORDER.map(d=><button key={d} className={`dtab${selDay===d?" active":""}${d===today?" today":""}`} onClick={()=>setSelDay(d)}>{DAYS_FR[d]}</button>)}</div>
          <div className="train-day">{selDay}</div>
          <div className="train-sub">{dayData.label}</div>
          <span className="train-tag" style={{color:dayData.color,borderColor:dayData.color}}>{dayData.tag}</span>

          {dayData.tag==="REPOS"?<div className="rest-card"><div className="rest-icon">💤</div><div className="rest-title">Repos Obligatoire</div><div className="rest-desc">SNC en récupération.<br/>C'est aujourd'hui que tu grandis.</div></div>:<>
            {dayData.exercises.map((ex,i)=>{
              const done=doneEx.includes(i),pr=getPR(selDay,i),sw=getSW(selDay,i);
              const isPR=sw&&pr?.best&&parseFloat(sw)>pr.best;
              const orm1=sw&&parseFloat(sw)>0?calc1RM(parseFloat(sw),ex.reps==="Max"?6:parseInt(ex.reps)||8):null;
              const prog=getProgression(selDay,i);
              const smartRest=getSmartRest(selDay,i);
              return(<div key={i} className="ex-wrap">
                <div className={`ex-row${done?" done":""}`} onClick={()=>toggleEx(selDay,i)}>
                  <div>
                    <div className="exnum">0{i+1}</div>
                    <div className="exname">{ex.name}</div>
                    <div className="exmeta"><span>{ex.sets}s</span>×<span>{ex.reps}</span> · repos:<span>{smartRest!==parseRest(ex.rest)?`${smartRest}s ⚡`:ex.rest}</span></div>
                    {EXERCISE_ALTS[ex.name]&&<button className="alt-toggle" onClick={e=>{e.stopPropagation();setShowAlts(a=>({...a,[`${selDay}-${i}`]:!a[`${selDay}-${i}`]}));}}>↔ Alternatives</button>}
                  </div>
                  <div className="chk">{done?"✓":""}</div>
                </div>
                {(()=>{const ww=prog?prog.kg:pr?.best||0;const ws=calcWarmup(ww);return ws.length>0&&!done?<div className="warmup-card"><div className="warmup-title">🔥 Échauffement</div><div className="warmup-sets">{ws.map((w,wi)=><div key={wi} className="warmup-set"><span>{w.weight}kg</span> × {w.reps} ({w.pct}%)</div>)}<div className="warmup-set" style={{borderColor:"var(--g)"}}><span>{ww>0?ww:"—"}kg</span> WORKING</div></div></div>:null;})()}
                {showAlts[`${selDay}-${i}`]&&EXERCISE_ALTS[ex.name]&&<div className="alt-panel">{EXERCISE_ALTS[ex.name].map((alt,ai)=>{const ww=prog?prog.kg:pr?.best||0;return <div key={ai} className="alt-item"><div><div className="alt-name">{alt.name}</div><div className="alt-note">{alt.note}</div></div><div className="alt-factor">{ww>0?Math.round(ww*alt.factor*2)/2+"kg":"—"}</div></div>;})}</div>}
                {/* Progression hint — toujours visible */}
                {prog&&<div className="prog-hint">
                  <span className="prog-label">Cible:</span>
                  <span className="prog-target">{prog.kg} kg</span>
                  {pr?.best&&<span className="prog-label">last: {pr.best}kg</span>}
                  <span className="prog-reason">{prog.reason}</span>
                </div>}
                {done&&<div className="pr-row">
                  <input type="number" className="pr-input" placeholder="0" value={sw} onChange={e=>setSW(selDay,i,e.target.value)} onKeyDown={e=>e.key==="Enter"&&savePR(selDay,i,sw)} step="2.5"/>
                  <span className="pr-unit">kg</span>
                  {isPR&&<span className="pr-badge new">🔥 PR!</span>}
                  {!isPR&&pr?.best&&<span className="pr-badge prev">Best:{pr.best}kg</span>}
                  {orm1&&<span className="orm-line">1RM≈{orm1}kg</span>}
                  <button className="pr-save" onClick={()=>savePR(selDay,i,sw)}>SAVE</button>
                </div>}
              </div>);
            })}
            <div className="notes-wrap"><div className="notes-lbl">Notes de séance</div><textarea className="notes-area" placeholder="Ressentis, charges, observations..." value={notes[`${wkId}-${selDay}`]||""} onChange={e=>saveNote(selDay,e.target.value)} rows={3}/></div>
            <button className={`cbtn${sessDoneDay?" done":""}`} onClick={()=>markDone(selDay)}>{sessDoneDay?"✓ SÉANCE COMPLÉTÉE":"VALIDER LA SÉANCE"}</button>
          </>}
        </>}

        {/* ══════════════ STATS ══════════════ */}
        {tab==="stats"&&<>
          <div className="stabs">
            {[["bilan","◈ Bilan"],["graphes","∿ Graphes"],["prs","🏆 PRs"],["objectifs","🎯 Objectifs"],["competition","⚔ VS"],["insights","🧬 Insights"],["hist","📋 Hist."],["calculs","⚙ Calculs"],["settings","≡ Config"]].map(([id,lbl])=><button key={id} className={`stab${statsTab===id?" active":""}`} onClick={()=>setStatsTab(id)}>{lbl}</button>)}
          </div>

          {/* BILAN */}
          {statsTab==="bilan"&&<>
            <p className="stitle">Bilan hebdomadaire</p>
            <div className="bilan-card">
              {[
                {lbl:"Séances semaine",sub:"Lun/Mar/Jeu/Sam",val:`${sessDone} / 4`,cls:sessDone>=4?"good":sessDone>=2?"gold":"warn"},
                {lbl:"Bloc actuel",sub:`Cycle #${Math.ceil(currentPeriod.weekNum/4)}`,val:`${currentPeriod.block} S${currentPeriod.weekInCycle}`,cls:"gold"},
                {lbl:"Calories aujourd'hui",sub:`Objectif ${effCal} kcal`,val:`${tot.cal} kcal`,cls:tot.cal>=effCal*.9?"good":tot.cal>=effCal*.6?"gold":"warn"},
                {lbl:"Protéines",sub:`Objectif ${effTargets.p}g`,val:`${tot.p}g`,cls:tot.p>=effTargets.p?"good":tot.p>=effTargets.p*.7?"gold":"warn"},
                {lbl:"Calories moy. 7j",sub:`${bilanData.length} jours`,val:avgCal?`${avgCal} kcal`:"—",cls:avgCal?avgCal>=effCal-100?"good":"gold":"gold"},
                {lbl:"Protéines moy. 7j",sub:"Tendance",val:avgProt?`${avgProt}g`:"—",cls:avgProt?avgProt>=effTargets.p?"good":"gold":"gold"},
                {lbl:"Poids actuel",sub:"Dernier enregistrement",val:lastW?`${lastW} kg`:"—",cls:"gold"},
                {lbl:"Hydratation",sub:"Aujourd'hui",val:`${hydroCount}/8`,cls:hydroCount>=8?"good":hydroCount>=5?"gold":"warn"},
                {lbl:"Suppléments",sub:"Pris aujourd'hui",val:`${suppsDoneCount}/4`,cls:suppsDoneCount===4?"good":suppsDoneCount>=2?"gold":"warn"},
                {lbl:"Récupération",sub:"Score matinal",val:recoveryFilled?`${recoveryAvg}/5`:"—",cls:recoveryAvg>=4?"good":recoveryAvg>=3?"gold":"warn"},
                {lbl:"Sommeil",sub:"Durée",val:sleepDuration?`${sleepDuration.hours}h${String(sleepDuration.minutes).padStart(2,"0")}`:"—",cls:sleepDuration?sleepDuration.total>=420?"good":"warn":"gold"},
                {lbl:"Mensurations",sub:"Dernière mesure",val:lastMeas?lastMeas.date:"—",cls:lastMeas?"gold":"warn"},
              ].map(({lbl,sub,val,cls},i)=><div key={i} className="bilan-row"><div><div className="bilan-lbl">{lbl}</div><div className="bilan-sub">{sub}</div></div><div className={`bilan-val ${cls}`}>{val}</div></div>)}
            </div>
            <button className="export-btn" onClick={generatePDF} style={{marginTop:8}}>📄 GÉNÉRER RAPPORT PDF HEBDOMADAIRE</button>
          </>}

          {/* GRAPHES */}
          {statsTab==="graphes"&&<>
            <p className="stitle">Graphiques</p>
            <LineChart data={wlogChart} color="#C9A84C" label="POIDS (kg)" unit="kg"/>
            <LineChart data={calChart} color="#E8C97A" label="CALORIES 7 JOURS" unit=" kcal"/>
            <LineChart data={protChart} color="#5DADE2" label="PROTÉINES 7 JOURS" unit="g"/>
            {/* Sleep quality chart */}
            {(()=>{const sd=Object.entries(sleepLog).filter(([d,s])=>s.quality>0).slice(-7).map(([d,s])=>({val:s.quality,label:d.slice(5)}));return sd.length>=2?<LineChart data={sd} color="#8E44AD" label="QUALITÉ SOMMEIL (1-5)" unit="/5"/>:null;})()}
            {(()=>{const rd=Object.entries(recoveryLog).filter(([d,r])=>r.sleep>0&&r.energy>0&&r.pain>0).slice(-7).map(([d,r])=>({val:Math.round(((r.sleep+r.energy+r.pain)/3)*10)/10,label:d.slice(5)}));return rd.length>=2?<LineChart data={rd} color="#E74C3C" label="SCORE RÉCUPÉRATION (1-5)" unit="/5"/>:null;})()}

            {/* Measurements charts */}
            {(()=>{const md=measLog.filter(e=>e.bras).slice(-10).map(e=>({val:e.bras,label:e.date.slice(5)}));return md.length>=2?<LineChart data={md} color="#E67E22" label="TOUR DE BRAS (cm)" unit="cm"/>:null;})()}
            {(()=>{const md=measLog.filter(e=>e.taille).slice(-10).map(e=>({val:e.taille,label:e.date.slice(5)}));return md.length>=2?<LineChart data={md} color="#E74C3C" label="TOUR DE TAILLE (cm)" unit="cm"/>:null;})()}
            {(()=>{const md=measLog.filter(e=>e.cuisse).slice(-10).map(e=>({val:e.cuisse,label:e.date.slice(5)}));return md.length>=2?<LineChart data={md} color="#27AE60" label="TOUR DE CUISSE (cm)" unit="cm"/>:null;})()}

            <p className="stitle">Progression exercices</p>
            {allExNames.filter(n=>(prData[n]||[]).length>=2).map(name=>{
              const d=(prData[name]||[]).slice(-8).map(e=>({val:e.weight,label:e.date.slice(5)}));
              return <LineChart key={name} data={d} color="#8E44AD" label={name.slice(0,26).toUpperCase()} unit="kg"/>;
            })}
            {allExNames.filter(n=>(prData[n]||[]).length>=2).length===0&&<p style={{fontSize:7,color:"var(--dim)",padding:"12px 0",textAlign:"center"}}>Log tes charges dans Training → les courbes apparaissent ici</p>}
          </>}

          {/* PRs */}
          {statsTab==="prs"&&<>
            {!selPrEx?<><p className="stitle">Records Personnels</p><div className="pr-ex-list">{allExNames.map(name=>{const hist=prData[name]||[],best=hist.length>0?Math.max(...hist.map(h=>h.weight)):null;return <button key={name} className="pr-ex-btn" onClick={()=>setSelPrEx(name)}><span>{name}</span><span className="pr-ex-best">{best?`${best} kg`:<span style={{color:"var(--dim)",fontSize:8}}>—</span>}</span></button>;})}</div></>
            :<><button className="back-btn" onClick={()=>setSelPrEx(null)}>← Retour</button><p className="stitle" style={{marginTop:0}}>{selPrEx}</p>
              {(prData[selPrEx]||[]).length===0?<p style={{fontSize:7,color:"var(--dim)",padding:"14px 0"}}>Aucune donnée</p>
              :<div className="pr-timeline">{[...(prData[selPrEx]||[])].reverse().map((e,i,arr)=>{const best=Math.max(...arr.map(x=>x.weight));return(<div key={i} className="pr-tl-entry"><div><div className="pr-tl-date">{e.date}</div><div style={{fontSize:6,color:"var(--dim)",marginTop:1}}>{e.day}</div></div><div style={{display:"flex",alignItems:"center",gap:7}}>{e.weight===best&&<span className="pr-tl-badge">PR</span>}<div className="pr-tl-val">{e.weight}<span style={{fontSize:7,color:"var(--dim)"}}> kg</span></div></div></div>);})}</div>}
            </>}
          </>}

          {/* OBJECTIFS */}
          {statsTab==="objectifs"&&<>
            <p className="stitle">Objectifs par exercice</p>
            {Object.entries(goals).map(([name,goal])=>{
              const gp=getGoalProgress(name);if(!gp)return null;
              return(<div key={name} className={`goal-card${gp.onTrack?" ontrack":" behind"}`}>
                <div className="goal-top">
                  <div><div className="goal-name">{name}</div><div className="goal-sub">Deadline: {goal.deadline} · {gp.daysLeft}j restants</div></div>
                  <div><div className="goal-target">{goal.targetKg}<span style={{fontSize:9,color:"var(--dim)"}}>kg</span></div><div className="goal-unit">Objectif</div></div>
                </div>
                <div className="goal-prog-track"><div className="goal-prog-fill" style={{width:`${gp.progress*100}%`,background:gp.onTrack?"#27AE60":"#E74C3C"}}/></div>
                <div className="goal-stats">
                  <div className="goal-stat">Actuel: <span>{gp.best||"—"}kg</span></div>
                  <div className="goal-stat">Manque: <span>{Math.max(0,goal.targetKg-gp.best).toFixed(1)}kg</span></div>
                  <div className="goal-stat">Rythme: <span>+{gp.weeklyNeeded}kg/sem</span></div>
                  <span className={`goal-badge${gp.onTrack?" on":" off"}`}>{gp.onTrack?"ON TRACK":"BEHIND"}</span>
                </div>
                <button onClick={()=>deleteGoal(name)} style={{background:"none",border:"none",color:"var(--dim)",fontSize:9,cursor:"pointer",marginTop:7,fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}}>✕ SUPPRIMER</button>
              </div>);
            })}
            {Object.keys(goals).length===0&&<p style={{fontSize:7,color:"var(--dim)",padding:"12px 0"}}>Aucun objectif défini</p>}

            <div className="goal-form">
              <div className="goal-form-title">+ NOUVEL OBJECTIF</div>
              <div className="calc-lbl">Exercice</div>
              <select className="goal-select" value={goalForm.ex} onChange={e=>setGoalForm(f=>({...f,ex:e.target.value}))}>
                <option value="">Sélectionner un exercice</option>
                {allExNames.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
              <div className="goal-grid">
                <div><div className="goal-lbl">Poids cible (kg)</div><input type="number" className="goal-input" placeholder="100" value={goalForm.target} onChange={e=>setGoalForm(f=>({...f,target:e.target.value}))}/></div>
                <div><div className="goal-lbl">Deadline</div><input type="date" className="goal-input" style={{fontSize:11}} value={goalForm.deadline} onChange={e=>setGoalForm(f=>({...f,deadline:e.target.value}))}/></div>
              </div>
              <button className="goal-btn" onClick={saveGoal}>ENREGISTRER L'OBJECTIF</button>
            </div>
          </>}

          {/* COMPÉTITION */}
          {statsTab==="competition"&&<>
            <p className="stitle">Toi vs. Semaine dernière</p>
            {competitionData.length===0?<p style={{fontSize:7,color:"var(--dim)",padding:"12px 0",textAlign:"center"}}>Log des charges pour voir la comparaison</p>
            :competitionData.map(({name,thisWeek,lastWeek,delta})=>(
              <div key={name} className="comp-row">
                <div className="comp-name">{name}</div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <span className="comp-week comp-prev">{lastWeek||"—"}</span>
                  <span style={{color:"var(--dim)",fontSize:9}}>→</span>
                  <span className="comp-week comp-curr">{thisWeek||"—"}</span>
                  <span style={{fontSize:6,color:"var(--dim)"}}>kg</span>
                  {delta!==null&&<span className={`comp-delta${delta>0?" up":delta<0?" down":" same"}`}>{delta>0?"+":""}{delta}</span>}
                </div>
              </div>
            ))}
            {competitionData.length>0&&<div style={{background:"var(--s)",border:"1px solid var(--b)",padding:"11px",marginTop:8}}>
              <div style={{fontSize:6,letterSpacing:2,textTransform:"uppercase",color:"var(--dim)",marginBottom:7}}>SCORE HEBDOMADAIRE</div>
              {(()=>{const up=competitionData.filter(d=>d.delta&&d.delta>0).length,dn=competitionData.filter(d=>d.delta&&d.delta<0).length,same=competitionData.filter(d=>d.delta===0).length;return(<div style={{display:"flex",gap:12,fontSize:8}}><span style={{color:"#27AE60"}}>↑ {up} améliorations</span><span style={{color:"#E74C3C"}}>↓ {dn} régressions</span><span style={{color:"var(--dim)"}}>= {same} stables</span></div>);})()}
            </div>}
          </>}

          {/* INSIGHTS */}
          {statsTab==="insights"&&<>
            <p className="stitle">🧬 Corrélation performance / nutrition</p>
            {nutritionCorrelation?<div className="insight-card">
              <div className="insight-title">Découverte data</div>
              <div className="insight-text">Quand tu manges sous <div className="insight-stat">{nutritionCorrelation.threshold} kcal</div> la veille, tes charges chutent en moyenne de <div className="insight-stat">{nutritionCorrelation.drop}%</div>.<br/><span style={{fontSize:7,color:"var(--dim)"}}>Basé sur {nutritionCorrelation.sampleSize} jours.</span></div>
            </div>:<div style={{background:"var(--s)",border:"1px solid var(--b)",padding:14,fontSize:7,color:"var(--dim)",textAlign:"center",marginBottom:8}}>Accumule 4+ semaines de données calories + charges pour les corrélations.</div>}
            {plateaus.length>0&&<><p className="stitle">⚠ Exercices en plateau</p>
              {plateaus.map(p=><div key={p.name} className="plateau-card"><div className="plateau-ex">{p.name}</div><div className="plateau-detail">Bloqué à {p.weight}kg — pas de progression sur 3+ semaines.</div></div>)}</>}
            <p className="stitle">🤖 Analyse IA personnalisée</p>
            <div className="ai-card">
              <div className="ai-title">Claude analyse tes données</div>
              {aiAnalysis?<div className="ai-result">{aiAnalysis}</div>
              :<div style={{fontSize:7,color:"var(--dim)",lineHeight:1.7,marginBottom:8}}>Après 2+ semaines de données, Claude analyse tes PRs, nutrition, sommeil et récupération.</div>}
              <button className="ai-btn" onClick={runAIAnalysis} disabled={aiAnalysisLoading}>{aiAnalysisLoading?"⏳ ANALYSE EN COURS...":"🧠 LANCER L'ANALYSE IA"}</button>
            </div>
          </>}

          {/* HISTORIQUE */}
          {statsTab==="hist"&&<>
            <p className="stitle">Historique séances</p>
            {getSessHistory().length===0?<p style={{fontSize:7,color:"var(--dim)",padding:"18px 0",textAlign:"center"}}>Aucune séance validée</p>
            :getSessHistory().map((s,i)=><div key={i} className="sh-entry"><div className="sh-top"><div><div className="sh-day">{s.day}</div><div className="sh-date">{s.wk}</div></div><div style={{fontSize:8,color:"var(--g)",fontFamily:"'Cormorant Garamond',serif"}}>{s.done.length}/{s.total}</div></div><div className="sh-completion">{TP[s.day]?.exercises.map((ex,j)=><span key={j} className={`sh-ex${s.done.includes(j)?" done":" skip"}`}>{ex.name.split(" ")[0]}</span>)}</div>{s.note&&<div className="sh-note">"{s.note}"</div>}</div>)}
          </>}

          {/* CALCULS */}
          {statsTab==="calculs"&&<>
            {/* Timing suppléments */}
            <p className="stitle">⏱ Timing Suppléments</p>
            <div className="timing-card">
              <div className="timing-title">Caféine · Créatine · Whey</div>
              <div className="timing-input-row">
                <div style={{flex:1}}><div className="timing-lbl">Heure d'entraînement</div><input className="timing-input" type="time" value={timingForm.trainTime} onChange={e=>setTimingForm({trainTime:e.target.value})}/></div>
                <button className="timing-btn" onClick={computeTiming}>CALCULER</button>
              </div>
              {timingResult&&<div className="timing-result">
                {[
                  {icon:"☕",lbl:"Caféine pre-workout",val:`${timingResult.preWorkout.from} — ${timingResult.preWorkout.to}`,status:timingResult.caffeineOk?"good":"warn",badge:timingResult.caffeineOk?"OK":"⚠ Tard"},
                  {icon:"☕",lbl:"Dernière caféine safe",val:timingResult.lastCaffeine,status:"good",badge:"Sommeil 23h"},
                  {icon:"⚡",lbl:"Créatine",val:timingResult.creatine,status:"good",badge:"Post-workout"},
                  {icon:"🥛",lbl:"Whey post-workout",val:timingResult.whey,status:"good",badge:"15min après"},
                ].map(({icon,lbl,val,status,badge},i)=>(
                  <div key={i} className="timing-item">
                    <div><span className="ti-icon">{icon}</span><span className="ti-lbl">{lbl}</span></div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div className="ti-val">{val}</div>
                      <span className={`ti-ok ${status}`}>{badge}</span>
                    </div>
                  </div>
                ))}
              </div>}
            </div>

            {/* TDEE */}
            <p className="stitle">Calculateur TDEE</p>
            <div className="calc-wrap">
              <div className="calc-grid">
                {[["w","Poids (kg)"],["h","Taille (cm)"],["a","Âge"]].map(([k,lbl])=><div key={k}><div className="calc-lbl">{lbl}</div><input type="number" className="calc-input" placeholder="—" value={tdeeForm[k]} onChange={e=>setTdeeForm(f=>({...f,[k]:e.target.value}))}/></div>)}
                <div><div className="calc-lbl">Sexe</div><select className="calc-select" value={tdeeForm.sex} onChange={e=>setTdeeForm(f=>({...f,sex:e.target.value}))}><option value="H">Homme</option><option value="F">Femme</option></select></div>
              </div>
              <div style={{marginBottom:7}}><div className="calc-lbl">Activité</div><select className="calc-select" value={tdeeForm.act} onChange={e=>setTdeeForm(f=>({...f,act:e.target.value}))}><option value="sed">Sédentaire</option><option value="light">Légèrement actif</option><option value="mod">Modérément actif (3-5j)</option><option value="active">Très actif (6-7j) ← TOI</option><option value="vactive">Athlète (2x/jour)</option></select></div>
              <button className="calc-btn" onClick={computeTDEE}>CALCULER MON TDEE</button>
              {tdeeResult&&<div className="tdee-result"><div style={{fontSize:6,letterSpacing:2,textTransform:"uppercase",color:"var(--dim)",marginBottom:4}}>DÉPENSE ÉNERGÉTIQUE TOTALE</div><div className="tdee-main">{tdeeResult.total} <span style={{fontSize:13,color:"var(--dim)"}}>kcal/j</span></div><div className="tdee-breakdown"><div className="tdee-item">Maintien: <span>{tdeeResult.total}</span></div><div className="tdee-item">Prise masse: <span>{tdeeResult.bulk}</span></div><div className="tdee-item">Jour train: <span>{tdeeResult.train}</span></div><div className="tdee-item">Jour repos: <span>{tdeeResult.rest}</span></div></div></div>}
            </div>

            {/* 1RM */}
            <p className="stitle">Calculateur 1RM (Epley)</p>
            <div className="calc-wrap">
              <div className="calc-grid">
                <div><div className="calc-lbl">Poids soulevé (kg)</div><input type="number" className="calc-input" placeholder="80" value={ormForm.w} onChange={e=>setOrmForm(f=>({...f,w:e.target.value}))}/></div>
                <div><div className="calc-lbl">Nombre de reps</div><input type="number" className="calc-input" placeholder="5" value={ormForm.r} onChange={e=>setOrmForm(f=>({...f,r:e.target.value}))} min="1" max="30"/></div>
              </div>
              <button className="calc-btn" onClick={()=>{const w=parseFloat(ormForm.w),r=parseInt(ormForm.r);if(!w||!r)return;setOrmResult({max:calc1RM(w,r),w,r});}}>CALCULER LE 1RM</button>
              {ormResult&&<div className="orm-result"><div style={{fontSize:6,letterSpacing:2,textTransform:"uppercase",color:"var(--dim)",marginBottom:3}}>FORCE MAXIMALE ESTIMÉE</div><div className="orm-main">{ormResult.max} <span style={{fontSize:12,color:"var(--dim)"}}>kg</span></div><div className="orm-sub">{ormResult.w}kg × {ormResult.r} reps</div><div style={{marginTop:7}}>{[[100,"1RM"],[95,"2 reps"],[90,"4 reps"],[85,"6 reps"],[80,"8 reps"],[75,"10 reps"],[70,"12 reps"]].map(([pct,lbl])=><div key={pct} className="orm-table-row"><span>{pct}% · {lbl}</span><span>{Math.round(ormResult.max*pct/100)} kg</span></div>)}</div></div>}
            </div>

            {/* Poids */}
            <p className="stitle">Poids corporel</p>
            <div className="win-wrap"><div className="wlbl">Poids du jour</div><div className="win-row"><input type="number" className="win" placeholder="75.0" value={wInput} onChange={e=>setWInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveWeight()} step="0.1"/><span className="wunit">kg</span><button className="wsave" onClick={saveWeight}>SAVE</button></div></div>
            {wlog.length>0&&<div className="wlog">{[...wlog].reverse().slice(0,12).map((e,i,arr)=>{const prev=arr[i+1],delta=prev?(e.weight-prev.weight).toFixed(1):null;return(<div key={e.date} className="went"><div className="wdate">{e.date}</div><div style={{display:"flex",alignItems:"center",gap:7}}>{delta!==null&&<span className={`wdelta ${parseFloat(delta)>0?"dup":parseFloat(delta)<0?"ddn":"dsame"}`}>{parseFloat(delta)>0?"+":""}{delta}</span>}<div className="wval">{e.weight}<span style={{fontSize:8,color:"var(--dim)"}}> kg</span></div></div></div>);})}</div>}

            {/* MENSURATIONS */}
            <p className="stitle">📐 Mensurations corporelles</p>
            <div className="calc-wrap">
              <div style={{fontSize:6,letterSpacing:1.5,textTransform:"uppercase",color:"var(--dim)",marginBottom:8}}>Le poids seul est trompeur en recomposition. Mesure tes tours pour suivre les vrais progrès.</div>
              <div className="calc-grid">
                {[{k:"bras",lbl:"Tour de bras (cm)"},{k:"poitrine",lbl:"Poitrine (cm)"},{k:"taille",lbl:"Tour de taille (cm)"},{k:"hanches",lbl:"Hanches (cm)"},{k:"cuisse",lbl:"Tour de cuisse (cm)"}].map(({k,lbl})=>(
                  <div key={k}><div className="calc-lbl">{lbl}</div><input type="number" className="calc-input" placeholder={lastMeas&&lastMeas[k]?String(lastMeas[k]):"—"} value={measInput[k]} onChange={e=>setMeasInput(f=>({...f,[k]:e.target.value}))} step="0.5"/></div>
                ))}
              </div>
              {lastMeas&&<div style={{background:"var(--dark)",border:"1px solid var(--b)",padding:8,marginBottom:7}}>
                <div style={{fontSize:6,letterSpacing:2,textTransform:"uppercase",color:"var(--dim)",marginBottom:5}}>DERNIÈRE MESURE — {lastMeas.date}</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[{k:"bras",l:"Bras"},{k:"poitrine",l:"Poit."},{k:"taille",l:"Taille"},{k:"hanches",l:"Hanches"},{k:"cuisse",l:"Cuisse"}].map(({k,l})=>lastMeas[k]?<div key={k} style={{textAlign:"center"}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:"var(--t)"}}>{lastMeas[k]}</div><div style={{fontSize:5,color:"var(--dim)",letterSpacing:1}}>{l} cm</div></div>:null)}
                </div>
              </div>}
              <button className="calc-btn" onClick={saveMeas}>ENREGISTRER LES MENSURATIONS</button>
              {measLog.length>1&&<div className="wlog" style={{marginTop:7}}>
                {[...measLog].reverse().slice(0,8).map((e,i,arr)=>{
                  const prev=arr[i+1];
                  const changes=["bras","taille","cuisse","poitrine","hanches"].filter(k=>e[k]&&prev&&prev[k]).map(k=>({k,d:(e[k]-prev[k]).toFixed(1)})).filter(x=>parseFloat(x.d)!==0);
                  return(<div key={e.date} className="went" style={{flexDirection:"column",alignItems:"stretch",gap:3}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <div className="wdate">{e.date}</div>
                      <div style={{display:"flex",gap:6}}>
                        {["bras","taille","cuisse"].map(k=>e[k]?<span key={k} style={{fontSize:7,color:"var(--t)"}}>{k.charAt(0).toUpperCase()}:{e[k]}</span>:null)}
                      </div>
                    </div>
                    {changes.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{changes.map(({k,d})=><span key={k} className={`wdelta ${parseFloat(d)>0?(k==="taille"?"dup":"ddn"):k==="taille"?"ddn":"dup"}`} style={{fontSize:6}}>{k}: {parseFloat(d)>0?"+":""}{d}</span>)}</div>}
                  </div>);
                })}
              </div>}
            </div>
          </>}

          {/* SETTINGS */}
          {statsTab==="settings"&&<>
            <p className="stitle">Périodisation</p>
            <div className="settings-wrap">
              <div className="set-row"><div><div className="set-lbl">Date début cycle</div><div className="set-sub">Sem. {currentPeriod.weekInCycle}/4 · {currentPeriod.block}</div></div><input type="date" className="set-input" style={{width:"auto",fontSize:8}} value={periodSettings.startDate} onChange={e=>{const n={...periodSettings,startDate:e.target.value};setPeriodSettings(n);sv("v7_period",n);}}/></div>
              <div className="set-row"><div><div className="set-lbl">Phase nutritionnelle</div><div className="set-sub">Affecte macros auto</div></div><select className="set-select" value={periodSettings.phase} onChange={e=>{const n={...periodSettings,phase:e.target.value};setPeriodSettings(n);sv("v7_period",n);}}><option value="cut">Sèche (Cut)</option><option value="maintain">Maintien</option><option value="bulk">Prise de masse (Bulk)</option></select></div>
            </div>

            <p className="stitle">Macros</p>
            <div className="settings-wrap">
              <div className="set-row"><div><div className="set-lbl">Macros automatiques</div><div className="set-sub">Calculées depuis poids actuel {lastW?`(${lastW}kg)`:""}</div></div><Toggle on={dynMacros} onToggle={()=>{const v=!dynMacros;setDynMacros(v);sv("v7_dynmac",v);}}/></div>
              {!dynMacros&&[{key:"train",lbl:"Jours entraînement",unit:"kcal"},{key:"rest",lbl:"Jours repos",unit:"kcal"},{key:"p",lbl:"Protéines",unit:"g"},{key:"c",lbl:"Glucides",unit:"g"},{key:"f",lbl:"Lipides",unit:"g"}].map(({key,lbl,unit})=><div key={key} className="set-row"><div><div className="set-lbl">{lbl}</div></div><div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" className="set-input" value={targets[key]} onChange={e=>{const n={...targets,[key]:parseInt(e.target.value)||targets[key]};setTargets(n);sv("v7_targets",n);}} step={key==="train"||key==="rest"?50:5}/><span style={{fontSize:6,color:"var(--dim)"}}>{unit}</span></div></div>)}
            </div>

            <p className="stitle">Notifications</p>
            <div className="settings-wrap">
              <div className="set-row"><div><div className="set-lbl">Notifications navigateur</div><div className="set-sub">Timer repos · Ftour 18h45 · S'hour 4h45 · PRs</div></div><button className={`notif-btn${notifOk?" on":""}`} onClick={handleNotifToggle} style={{padding:"6px 11px"}}>{notifOk?"✓ ACTIVÉ":"ACTIVER"}</button></div>
            </div>

            <p className="stitle">Cloud Sync (Supabase)</p>
            <div className="settings-wrap">
              <div style={{padding:"6px 0"}}>
                <div style={{fontSize:7,color:"var(--dim)",lineHeight:1.7,marginBottom:8}}>
                  Synchronise tes données via Supabase (gratuit jusqu'à 500MB).{" "}
                  <strong style={{color:"var(--t)"}}>Setup:</strong> Crée un projet sur supabase.com, puis une table <code style={{color:"var(--g)"}}>athlete_data</code> avec colonnes: <code style={{color:"var(--g)"}}>id</code> (text PK), <code style={{color:"var(--g)"}}>data</code> (jsonb), <code style={{color:"var(--g)"}}>updated_at</code> (timestamptz).
                </div>
                {supaConfig.connected&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:"#27AE60"}}/><span style={{fontSize:7,color:"#27AE60",letterSpacing:1}}>CONNECTÉ</span>
                  {supaConfig.lastSync&&<span style={{fontSize:6,color:"var(--dim)"}}>Dernière sync: {new Date(supaConfig.lastSync).toLocaleString("fr-FR")}</span>}
                </div>}
                {supaConfig.error&&<div style={{fontSize:7,color:"#E74C3C",marginBottom:6,padding:"5px 8px",border:"1px solid rgba(231,76,60,.3)",lineHeight:1.6}}>{supaConfig.error}</div>}
                {!supaConfig.connected?<>
                  <div style={{marginBottom:6}}><div className="calc-lbl">URL Supabase</div><input className="timing-input" type="text" placeholder="https://xxx.supabase.co" style={{fontSize:8,marginBottom:6}} id="supa-url" defaultValue={supaConfig.url}/></div>
                  <div style={{marginBottom:8}}><div className="calc-lbl">Clé Anon (public)</div><input className="timing-input" type="password" placeholder="eyJhbGciOi..." style={{fontSize:8}} id="supa-key" defaultValue={supaConfig.key}/></div>
                  <button className="export-btn" onClick={()=>{const u=document.getElementById("supa-url").value.trim(),k=document.getElementById("supa-key").value.trim();connectSupabase(u,k);}}>☁ CONNECTER À SUPABASE</button>
                </>:<div style={{display:"flex",gap:5}}>
                  <button className="export-btn" style={{flex:1}} onClick={pushToCloud} disabled={supaConfig.syncing}>{supaConfig.syncing?"⏳ SYNC...":"⬆ PUSH VERS CLOUD"}</button>
                  <button className="export-btn" style={{flex:1}} onClick={pullFromCloud} disabled={supaConfig.syncing}>{supaConfig.syncing?"⏳ SYNC...":"⬇ PULL DEPUIS CLOUD"}</button>
                </div>}
                {supaConfig.connected&&<button style={{background:"none",border:"none",color:"var(--dim)",fontSize:7,cursor:"pointer",marginTop:6,fontFamily:"'JetBrains Mono',monospace",letterSpacing:1}} onClick={()=>{const n={url:"",key:"",connected:false,syncing:false,lastSync:null,error:""};setSupaConfig(n);sv("v7_supa",n);showToast("DÉCONNECTÉ");}}>✕ DÉCONNECTER</button>}
              </div>
            </div>

            <p className="stitle">Données</p>
            <div className="settings-wrap">
              <div style={{padding:"6px 0"}}>
                <div style={{fontSize:6,letterSpacing:1.5,textTransform:"uppercase",color:"var(--dim)",marginBottom:9}}>Toutes tes données (PRs, poids, calories, séances) sont sauvegardées localement. Exporte régulièrement.</div>
                <button className="export-btn" onClick={exportData}>⬇ EXPORTER TOUTES MES DONNÉES (JSON)</button>
                <button className="export-btn" onClick={generatePDF} style={{marginTop:4}}>📄 RAPPORT PDF HEBDOMADAIRE</button>
                <div style={{fontSize:6,color:"var(--dim)",letterSpacing:.5}}>Fichier: athlete-backup-{dtId}.json — Import possible lors du prochain setup</div>
              </div>
            </div>
          </>}
        </>}
      </div>

      {/* TIMER */}
      {timer&&<div className="timer-bar">
        <div style={{flex:"0 0 auto"}}><div className="timer-exname">REPOS · {timer.exName}</div><div className={`timer-count${timer.seconds<=10?" urgent":""}`}>{fmtTime(timer.seconds)}</div></div>
        <div className="timer-track"><div className="timer-fill" style={{width:`${((timer.total-timer.seconds)/timer.total)*100}%`}}/></div>
        <button className="timer-skip" onClick={stopTimer}>SKIP</button>
      </div>}

      <div className={`toast${toast.show?" show":""}`}>{toast.msg}</div>
    </div>
  </>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
